# Pages CMS configuration
# Docs: https://pagescms.org/docs/configuration
# Edit content at: https://app.pagescms.org (connect your GitHub repo)
#
# NOTE: pagescms uses type: object + list: true for arrays of objects.
# type: list is for arrays of primitives only.

media:
  input: public/assets
  output: /assets

content:

  # ── Announcement Bar ─────────────────────────────────────
  - name: announcement
    label: Announcement Bar
    path: src/data/announcement.json
    type: file
    fields:
      - { name: enabled, label: "Show bar", type: boolean }
      - name: items
        label: Items
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{text}"
        fields:
          - { name: text,  label: Text,  type: string }
          - { name: emoji, label: Emoji, type: string }
          - name: link
            label: Optional Link
            type: object
            fields:
              - { name: label, label: Link Label, type: string }
              - { name: url,   label: URL,        type: string }

  # ── Navigation ───────────────────────────────────────────
  - name: navigation
    label: Navigation
    path: src/data/navigation.json
    type: file
    fields:
      - name: linksLeft
        label: Left Links
        type: object
        list: true
        fields:
          - { name: label, label: Label, type: string }
          - { name: href,  label: URL,   type: string }
      - name: linksRight
        label: Right Links
        type: object
        list: true
        fields:
          - { name: label, label: Label, type: string }
          - { name: href,  label: URL,   type: string }
      - name: cta
        label: CTA Button
        type: object
        fields:
          - { name: label, label: Label, type: string }
          - { name: href,  label: URL,   type: string }

  # ── Home Page ────────────────────────────────────────────
  - name: home
    label: Home Page
    path: src/data/home.json
    type: file
    fields:
      - name: sections
        label: Page Sections
        type: block
        list: true
        blockKey: type
        blocks:

          # ── Hero block ───────────────────────────────────
          - name: hero
            label: Hero
            fields:
              - { name: image,      label: Background Image, type: image }
              - { name: imageAlt,   label: Image Alt Text,   type: string }
              - { name: badge,      label: Badge Text,       type: string }
              - name: heading
                label: "Heading (use *asterisks* for italic)"
                type: string
              - { name: subheading, label: Subheading,       type: text }
              - name: cta
                label: CTA Button
                type: object
                fields:
                  - { name: label, label: Label, type: string }
                  - { name: href,  label: URL,   type: string }

          # ── Services block ───────────────────────────────
          - name: services
            label: Services Grid
            fields:
              - name: heading
                label: "Heading (use *asterisks* for italic)"
                type: string
              - { name: subheading, label: Subheading, type: text }
              - name: items
                label: Service Cards
                type: object
                list:
                  collapsible:
                    collapsed: true
                    summary: "{title}"
                fields:
                  - { name: icon,        label: "Icon key",       type: string }
                  - { name: title,       label: Title,            type: string }
                  - { name: description, label: Description,      type: text }
                  - { name: href,        label: "Learn more URL", type: string }

