# Pages CMS configuration
# Docs: https://pagescms.org/docs/configuration
# Edit content at: https://app.pagescms.org (connect your GitHub repo)
#
# NOTE: pagescms uses type: object + list: true for arrays of objects.
# type: list is for arrays of primitives only.

media:
  input: public/assets
  output: /assets

content:

  # ── Announcement Bar ─────────────────────────────────────
  - name: announcement
    label: Announcement Bar
    path: src/data/announcement.json
    type: file
    fields:
      - { name: enabled, label: "Show bar", type: boolean }
      - name: items
        label: Items
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{text}"
        fields:
          - { name: text,  label: Text,  type: string }
          - { name: emoji, label: Emoji, type: string }
          - name: link
            label: Optional Link
            type: object
            fields:
              - { name: label, label: Link Label, type: string }
              - { name: url,   label: URL,        type: string }

  # ── Navigation ───────────────────────────────────────────
  - name: navigation
    label: Navigation
    path: src/data/navigation.json
    type: file
    fields:
      - name: linksLeft
        label: Left Links
        type: object
        list: true
        fields:
          - { name: label, label: Label, type: string }
          - { name: href,  label: URL,   type: string }
      - name: linksRight
        label: Right Links
        type: object
        list: true
        fields:
          - { name: label, label: Label, type: string }
          - { name: href,  label: URL,   type: string }
      - name: cta
        label: CTA Button
        type: object
        fields:
          - { name: label, label: Label, type: string }
          - { name: href,  label: URL,   type: string }

  # ── Global Footer ───────────────────────────────────────
  - name: footer
    label: Footer (Global)
    path: src/data/footer.json
    type: file
    fields:
      - name: brand
        label: Brand
        type: object
        fields:
          - { name: name, label: Brand name, type: string }
          - { name: tagline, label: Tagline, type: text }
          - { name: address, label: Address (optional), type: string }
      - name: columns
        label: Link columns
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{title}"
        fields:
          - { name: title, label: Column title, type: string }
          - name: links
            label: Links
            type: object
            list:
              collapsible:
                collapsed: true
                summary: "{label}"
            fields:
              - { name: label, label: Label, type: string }
              - { name: href,  label: URL,   type: string }
      - name: legal
        label: Legal
        type: object
        fields:
          - { name: copyrightText, label: Copyright text, type: string }
          - name: links
            label: Legal links
            type: object
            list:
              collapsible:
                collapsed: true
                summary: "{label}"
            fields:
              - { name: label, label: Label, type: string }
              - { name: href,  label: URL,   type: string }

  # ── Pages Collection ────────────────────────────────────
  - name: pages
    label: Pages
    path: src/data/pages
    type: collection
    format: json
    filename: "{slug}.json"
    fields:
      - { name: id,          label: ID,          type: string }
      - { name: slug,        label: Slug (URL),  type: string }
      - { name: title,       label: Page Title,  type: string }
      - { name: description, label: Meta Description, type: string }
      - { name: heroIsDark,  label: "Dark hero navbar", type: boolean }
      - name: sections
        label: Page Sections
        type: block
        list: true
        blockKey: type
        blocks:
          # ── Hero block ───────────────────────────────────
          - name: hero
            label: Hero Section
            fields:
              - { name: image,      label: "Background image", type: image }
              - { name: imageAlt,   label: "Image alt",        type: string }
              - { name: badge,      label: "Badge emoji",      type: string }
              - name: heading
                label: "Heading (use *asterisks* for italic)"
                type: string
              - { name: subheading, label: Subheading, type: text }
              - name: cta
                label: Button
                type: object
                fields:
                  - { name: label, label: Label, type: string }
                  - { name: href,  label: URL,   type: string }

          # ── Services block ───────────────────────────────
          - name: services
            label: Services Grid
            fields:
              - name: heading
                label: "Heading (use *asterisks* for italic)"
                type: string
              - { name: subheading, label: Subheading, type: text }
              - name: items
                label: Services
                type: object
                list:
                  collapsible:
                    collapsed: true
                    summary: "{title}"
                fields:
                  - { name: icon,        label: "Icon image (optional)", type: image }
                  - { name: title,       label: Title,       type: string }
                  - { name: description, label: Description, type: text }
                  - { name: href,        label: Link URL,    type: string }

          # ── Feature block ────────────────────────────────
          - name: feature
            label: Feature Section
            fields:
              - name: layout
                label: Layout
                type: select
                options:
                  values:
                    - { value: image-left,  label: "Image left" }
                    - { value: image-right, label: "Image right" }
                    - { value: no-image,    label: "No image (center text)" }
              - { name: image,    label: "Image (optional)",    type: image }
              - { name: imageAlt, label: "Image alt",           type: string }
              - name: heading
                label: "Heading (use *asterisks* for italic)"
                type: string
              - { name: body, label: Body text, type: text }
              - name: features
                label: Feature list
                type: object
                list:
                  collapsible:
                    collapsed: true
                    summary: "{text}"
                fields:
                  - { name: bulletIcon, label: "Bullet icon image (optional)", type: image }
                  - { name: text,       label: Text, type: string }
              - name: ctaPrimary
                label: Primary button (optional)
                type: object
                fields:
                  - { name: label, label: Label, type: string }
                  - { name: href,  label: URL,   type: string }
              - name: ctaSecondary
                label: Secondary button (optional)
                type: object
                fields:
                  - { name: label, label: Label, type: string }
                  - { name: href,  label: URL,   type: string }

          # ── Testimonials block ───────────────────────────
          - name: testimonials
            label: Testimonials Carousel
            fields:
              - name: heading
                label: "Heading (use *asterisks* for italic)"
                type: string
              - { name: subheading, label: Subheading (optional), type: text }
              - name: testimonials
                label: Reviews
                type: object
                list:
                  collapsible:
                    collapsed: true
                    summary: "{author} — \"{quote}\""
                fields:
                  - { name: image,    label: "Image (optional)",    type: image }
                  - { name: imageAlt, label: "Image alt",           type: string }
                  - name: rating
                    label: Star rating (1-5)
                    type: number
                  - { name: quote,    label: Quote/title,          type: string }
                  - { name: text,     label: Review text,          type: text }
                  - { name: author,   label: Author name,          type: string }

          # ── CTA block ─────────────────────────────────────
          - name: cta
            label: Call To Action
            fields:
              - name: heading
                label: "Heading (use *asterisks* for italic)"
                type: string
              - { name: body, label: Body text, type: text }
              - name: ctaPrimary
                label: Primary button (optional)
                type: object
                fields:
                  - { name: label, label: Label, type: string }
                  - { name: href,  label: URL,   type: string }
              - name: ctaSecondary
                label: Secondary button (optional)
                type: object
                fields:
                  - { name: label, label: Label, type: string }
                  - { name: href,  label: URL,   type: string }
              - name: backgroundColor
                label: "Background color (hex, e.g. #5C3D1E)"
                type: string
                default: "var(--color-primary)"

          # ── FAQ block ─────────────────────────────────────
          - name: faq
            label: FAQ (Accordion)
            fields:
              - name: heading
                label: "Heading (use *asterisks* for italic)"
                type: string
              - { name: body, label: Description (optional), type: text }
              - name: faqs
                label: Questions
                type: object
                list:
                  collapsible:
                    collapsed: true
                    summary: "{question}"
                fields:
                  - { name: question, label: Question, type: string }
                  - { name: answer,   label: Answer,   type: text }
              - name: cta
                label: Contact CTA (optional)
                type: object
                fields:
                  - { name: label, label: Label, type: string }
                  - { name: href,  label: URL,   type: string }

          # ── Contact Form block ───────────────────────────
          - name: contact-form
            label: Contact Form
            fields:
              - name: heading
                label: "Heading (use *asterisks* for italic)"
                type: string
              - { name: body, label: Body text (optional), type: text }
              - { name: endpointUrl, label: Apps Script Bridge URL, type: string }
              - { name: submitLabel, label: Submit button label, type: string }
              - { name: note, label: Small note (optional), type: text }

          # ── Hero Centered block ─────────────────────────
          - name: hero-centered
            label: Hero (Centered)
            fields:
              - { name: badge, label: Badge text (optional), type: string }
              - name: heading
                label: "Heading (use *asterisks* for italic)"
                type: string
              - { name: subheading, label: Subheading (optional), type: text }
              - name: ctaPrimary
                label: Primary button (optional)
                type: object
                fields:
                  - { name: label, label: Label, type: string }
                  - { name: href,  label: URL,   type: string }
              - name: ctaSecondary
                label: Secondary button (optional)
                type: object
                fields:
                  - { name: label, label: Label, type: string }
                  - { name: href,  label: URL,   type: string }

          # ── Media Centered block ────────────────────────
          - name: media-centered
            label: Media (Centered)
            fields:
              - name: kind
                label: Media type
                type: select
                options:
                  values:
                    - { value: image, label: Image }
                    - { value: video, label: Video }
              - { name: image,    label: Image (for image mode), type: image }
              - { name: imageAlt, label: Image alt text,          type: string }
              - { name: videoSrc, label: Video file URL (for video mode), type: string }
              - { name: poster,   label: Video poster image (optional),   type: image }
              - { name: caption,  label: Caption (optional),      type: text }

          # ── Gallery block ───────────────────────────────
          - name: gallery
            label: Gallery
            fields:
              - { name: heading, label: Heading (optional), type: string }
              - { name: body,    label: Description (optional), type: text }
              - name: variant
                label: Layout variant
                type: select
                options:
                  values:
                    - { value: grid-2, label: Two-column grid }
                    - { value: mosaic, label: Mosaic }
                    - { value: strip,  label: Three-column strip }
              - name: items
                label: Gallery items
                type: object
                list:
                  collapsible:
                    collapsed: true
                    summary: "{caption}"
                fields:
                  - { name: image,    label: Image, type: image }
                  - { name: imageAlt, label: Image alt text, type: string }
                  - { name: caption,  label: Caption (optional), type: string }

          # ── Stats + Text block ──────────────────────────
          - name: stats-text
            label: Stats + Text
            fields:
              - name: heading
                label: "Heading (use *asterisks* for italic)"
                type: string
              - { name: body, label: Description (optional), type: text }
              - name: ctaPrimary
                label: Primary button (optional)
                type: object
                fields:
                  - { name: label, label: Label, type: string }
                  - { name: href,  label: URL,   type: string }
              - name: ctaSecondary
                label: Secondary button (optional)
                type: object
                fields:
                  - { name: label, label: Label, type: string }
                  - { name: href,  label: URL,   type: string }
              - name: stats
                label: Stats
                type: object
                list:
                  collapsible:
                    collapsed: true
                    summary: "{value}"
                fields:
                  - { name: value, label: Value, type: string }
                  - { name: label, label: Label, type: string }

          # ── Light CTA + Photo block ─────────────────────
          - name: light-cta-photo
            label: Light CTA + Photo
            fields:
              - name: heading
                label: "Heading (use *asterisks* for italic)"
                type: string
              - { name: body, label: Description (optional), type: text }
              - { name: image, label: Photo, type: image }
              - { name: imageAlt, label: Photo alt text, type: string }
              - name: cta
                label: Button
                type: object
                fields:
                  - { name: label, label: Label, type: string }
                  - { name: href,  label: URL,   type: string }

          # ── Markdown Content block ──────────────────────
          - name: markdown-content
            label: Markdown Content
            fields:
              - { name: heading,  label: Heading (optional), type: string }
              - { name: markdown, label: Markdown body,      type: code }

          # -- Insider Hero block ------------------------------------------
          - name: insider-hero
            label: Insider Hero (Editorial)
            fields:
              - name: heading
                label: "Heading (use *asterisks* for italic)"
                type: string
              - { name: subheading, label: Subheading (optional), type: text }

  # -- Blog Collection -----------------------------------------------------
  - name: blog
    label: Blog Posts
    path: src/content/blog
    type: collection
    format: yaml-frontmatter
    filename: "{slug}.md"
    view:
      primary: title
      sort: date
      order: desc
    fields:
      - { name: slug,     label: "Slug (URL)",             type: string }
      - { name: title,    label: Title,                    type: string }
      - { name: date,     label: Date,                     type: date   }
      - name: category
        label: Category
        type: select
        options:
          values:
            - { value: "News and Updates",     label: "News and Updates"     }
            - { value: "Resources and Guides", label: "Resources and Guides" }
            - { value: "Pet Care Tips",        label: "Pet Care Tips"        }
      - { name: image,    label: "Cover image (optional)", type: image  }
      - { name: imageAlt, label: "Image alt",              type: string }
      - { name: excerpt,  label: Excerpt,                  type: text   }

  # -- Insider Page --------------------------------------------------------
  - name: insider
    label: Insider (Blog Page)
    path: src/data/insider.json
    type: file
    format: json
    fields:
      - { name: title,          label: Page Title,       type: string }
      - { name: description,    label: Meta Description, type: text   }
      - name: heroHeading
        label: "Hero Heading (use *asterisks* for italic)"
        type: string
      - { name: heroSubheading, label: Hero Subheading,  type: text   }

actions:
  - name: deploy-site
    label: Deploy Site
    workflow: astro.yml
    ref: current
    cancelable: false

