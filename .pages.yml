# Pages CMS configuration
# Docs: https://pagescms.org/docs/configuration
# Edit content at: https://app.pagescms.org (connect your GitHub repo)
#
# NOTE: pagescms uses type: object + list: true for arrays of objects.
# type: list is for arrays of primitives only.

media:
  input: public/assets
  output: /assets

content:

  # ── Announcement Bar ─────────────────────────────────────
  - name: announcement
    label: Announcement Bar
    path: src/data/announcement.json
    type: file
    fields:
      - { name: enabled, label: "Show bar", type: boolean }
      - name: items
        label: Items
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{text}"
        fields:
          - { name: text,  label: Text,  type: string }
          - { name: emoji, label: Emoji, type: string }
          - name: link
            label: Optional Link
            type: object
            fields:
              - { name: label, label: Link Label, type: string }
              - { name: url,   label: URL,        type: string }

  # ── Navigation ───────────────────────────────────────────
  - name: navigation
    label: Navigation
    path: src/data/navigation.json
    type: file
    fields:
      - name: linksLeft
        label: Left Links
        type: object
        list: true
        fields:
          - { name: label, label: Label, type: string }
          - { name: href,  label: URL,   type: string }
      - name: linksRight
        label: Right Links
        type: object
        list: true
        fields:
          - { name: label, label: Label, type: string }
          - { name: href,  label: URL,   type: string }
      - name: cta
        label: CTA Button
        type: object
        fields:
          - { name: label, label: Label, type: string }
          - { name: href,  label: URL,   type: string }

  # ── Home Page ────────────────────────────────────────────
  - name: home
    label: Home Page
    path: src/data/home.json
    type: file
    fields:
      - name: sections
        label: Page Sections
        type: block
        list: true
        blockKey: type
        blocks:

          # ── Hero block ───────────────────────────────────
          - name: hero
            label: Hero
            fields:
              - { name: image,      label: Background Image, type: image }
              - { name: imageAlt,   label: Image Alt Text,   type: string }
              - { name: badge,      label: Badge Text,       type: string }
              - name: heading
                label: "Heading (use *asterisks* for italic)"
                type: string
              - { name: subheading, label: Subheading,       type: text }
              - name: cta
                label: CTA Button
                type: object
                fields:
                  - { name: label, label: Label, type: string }
                  - { name: href,  label: URL,   type: string }

          # ── Services block ───────────────────────────────
          - name: services
            label: Services Grid
            fields:
              - name: heading
                label: "Heading (use *asterisks* for italic)"
                type: string
              - { name: subheading, label: Subheading, type: text }
              - name: items
                label: Service Cards
                type: object
                list:
                  collapsible:
                    collapsed: true
                    summary: "{title}"
                fields:
                  - { name: icon,        label: "Icon image (optional)", type: image }
                  - { name: title,       label: Title,            type: string }
                  - { name: description, label: Description,      type: text }
                  - { name: href,        label: "Learn more URL", type: string }

          # ── Feature block ────────────────────────────────
          - name: feature
            label: Feature
            fields:
              - name: layout
                label: Layout
                type: select
                options:
                  values:
                    - { value: image-left,  label: "Image left" }
                    - { value: image-right, label: "Image right" }
                    - { value: no-image,    label: "No image (center text)" }
              - { name: image,    label: "Feature image (optional)", type: image }
              - { name: imageAlt, label: "Image alt", type: string }
              - name: heading
                label: "Heading (use *asterisks* for italic)"
                type: string
              - { name: body, label: Body text, type: text }
              - name: features
                label: Feature list
                type: object
                list:
                  collapsible:
                    collapsed: true
                    summary: "{text}"
                fields:
                  - { name: bulletIcon, label: "Bullet icon image (optional)", type: image }
                  - { name: text,       label: Text, type: string }
              - name: ctaPrimary
                label: Primary button (optional)
                type: object
                fields:
                  - { name: label, label: Label, type: string }
                  - { name: href,  label: URL,   type: string }
              - name: ctaSecondary
                label: Secondary button (optional)
                type: object
                fields:
                  - { name: label, label: Label, type: string }
                  - { name: href,  label: URL,   type: string }

          # ── Testimonials block ───────────────────────────
          - name: testimonials
            label: Testimonials Carousel
            fields:
              - name: heading
                label: "Heading (use *asterisks* for italic)"
                type: string
              - { name: subheading, label: Subheading (optional), type: text }
              - name: testimonials
                label: Reviews
                type: object
                list:
                  collapsible:
                    collapsed: true
                    summary: "{author} — \"{quote}\""
                fields:
                  - { name: image,    label: "Image (optional)",    type: image }
                  - { name: imageAlt, label: "Image alt",           type: string }
                  - name: rating
                    label: Star rating (1-5)
                    type: number
                  - { name: quote,    label: Quote/title,          type: string }
                  - { name: text,     label: Review text,          type: text }
                  - { name: author,   label: Author name,          type: string }

          # ── CTA block ─────────────────────────────────────
          - name: cta
            label: Call To Action
            fields:
              - name: heading
                label: "Heading (use *asterisks* for italic)"
                type: string
              - { name: body, label: Body text, type: text }
              - name: ctaPrimary
                label: Primary button (optional)
                type: object
                fields:
                  - { name: label, label: Label, type: string }
                  - { name: href,  label: URL,   type: string }
              - name: ctaSecondary
                label: Secondary button (optional)
                type: object
                fields:
                  - { name: label, label: Label, type: string }
                  - { name: href,  label: URL,   type: string }
              - name: backgroundColor
                label: "Background color (hex, e.g. #5C3D1E)"
                type: string
                default: "var(--color-primary)"

          # ── FAQ block ─────────────────────────────────────
          - name: faq
            label: FAQ (Accordion)
            fields:
              - name: heading
                label: "Heading (use *asterisks* for italic)"
                type: string
              - { name: body, label: Description (optional), type: text }
              - name: faqs
                label: Questions
                type: object
                list:
                  collapsible:
                    collapsed: true
                    summary: "{question}"
                fields:
                  - { name: question, label: Question, type: string }
                  - { name: answer,   label: Answer,   type: text }
              - name: cta
                label: Contact CTA (optional)
                type: object
                fields:
                  - { name: label, label: Label, type: string }
                  - { name: href,  label: URL,   type: string }
          # ── Insider Hero block ─────────────────────────────────────
          - name: insider-hero
            label: Insider Hero (Editorial)
            fields:
              - name: heading
                label: "Heading (use *asterisks* for italic)"
                type: string
              - { name: subheading, label: Subheading (optional), type: text }
  # ── Pages Collection ────────────────────────────────────
  - name: pages
    label: Pages
    path: src/data/pages
    type: collection
    format: json
    filename: "{slug}.json"
    fields:
      - { name: id,          label: ID,          type: string }
      - { name: slug,        label: Slug (URL),  type: string }
      - { name: title,       label: Page Title,  type: string }
      - { name: description, label: Meta Description, type: string }
      - { name: heroIsDark,  label: "Dark hero navbar", type: boolean }
      - name: sections
        label: Page Sections
        type: block
        list: true
        blockKey: type
        blocks:
          # ── Hero block ───────────────────────────────────
          - name: hero
            label: Hero Section
            fields:
              - { name: image,      label: "Background image", type: image }
              - { name: imageAlt,   label: "Image alt",        type: string }
              - { name: badge,      label: "Badge emoji",      type: string }
              - name: heading
                label: "Heading (use *asterisks* for italic)"
                type: string
              - { name: subheading, label: Subheading, type: text }
              - name: cta
                label: Button
                type: object
                fields:
                  - { name: label, label: Label, type: string }
                  - { name: href,  label: URL,   type: string }

          # ── Services block ───────────────────────────────
          - name: services
            label: Services Grid
            fields:
              - name: heading
                label: "Heading (use *asterisks* for italic)"
                type: string
              - { name: subheading, label: Subheading, type: text }
              - name: items
                label: Services
                type: object
                list:
                  collapsible:
                    collapsed: true
                    summary: "{title}"
                fields:
                  - { name: icon,        label: "Icon image (optional)", type: image }
                  - { name: title,       label: Title,       type: string }
                  - { name: description, label: Description, type: text }
                  - { name: href,        label: Link URL,    type: string }

          # ── Feature block ────────────────────────────────
          - name: feature
            label: Feature Section
            fields:
              - name: layout
                label: Layout
                type: select
                options: ["image-left", "image-right", "no-image"]
              - { name: image,    label: "Image (optional)",    type: image }
              - { name: imageAlt, label: "Image alt",           type: string }
              - name: heading
                label: "Heading (use *asterisks* for italic)"
                type: string
              - { name: body, label: Body text, type: text }
              - name: features
                label: Feature list
                type: object
                list:
                  collapsible:
                    collapsed: true
                    summary: "{text}"
                fields:
                  - { name: bulletIcon, label: "Bullet icon image (optional)", type: image }
                  - { name: text,       label: Text, type: string }
              - name: ctaPrimary
                label: Primary button (optional)
                type: object
                fields:
                  - { name: label, label: Label, type: string }
                  - { name: href,  label: URL,   type: string }
              - name: ctaSecondary
                label: Secondary button (optional)
                type: object
                fields:
                  - { name: label, label: Label, type: string }
                  - { name: href,  label: URL,   type: string }

          # ── Testimonials block ───────────────────────────
          - name: testimonials
            label: Testimonials Carousel
            fields:
              - name: heading
                label: "Heading (use *asterisks* for italic)"
                type: string
              - { name: subheading, label: Subheading (optional), type: text }
              - name: testimonials
                label: Reviews
                type: object
                list:
                  collapsible:
                    collapsed: true
                    summary: "{author} — \"{quote}\""
                fields:
                  - { name: image,    label: "Image (optional)",    type: image }
                  - { name: imageAlt, label: "Image alt",           type: string }
                  - name: rating
                    label: Star rating (1-5)
                    type: number
                  - { name: quote,    label: Quote/title,          type: string }
                  - { name: text,     label: Review text,          type: text }
                  - { name: author,   label: Author name,          type: string }

          # ── CTA block ─────────────────────────────────────
          - name: cta
            label: Call To Action
            fields:
              - name: heading
                label: "Heading (use *asterisks* for italic)"
                type: string
              - { name: body, label: Body text, type: text }
              - name: ctaPrimary
                label: Primary button (optional)
                type: object
                fields:
                  - { name: label, label: Label, type: string }
                  - { name: href,  label: URL,   type: string }
              - name: ctaSecondary
                label: Secondary button (optional)
                type: object
                fields:
                  - { name: label, label: Label, type: string }
                  - { name: href,  label: URL,   type: string }
              - name: backgroundColor
                label: "Background color (hex, e.g. #5C3D1E)"
                type: string
                default: "var(--color-primary)"

          # ── FAQ block ─────────────────────────────────────
          - name: faq
            label: FAQ (Accordion)
            fields:
              - name: heading
                label: "Heading (use *asterisks* for italic)"
                type: string
              - { name: body, label: Description (optional), type: text }
              - name: faqs
                label: Questions
                type: object
                list:
                  collapsible:
                    collapsed: true
                    summary: "{question}"
                fields:
                  - { name: question, label: Question, type: string }
                  - { name: answer,   label: Answer,   type: text }
              - name: cta
                label: Contact CTA (optional)
                type: object
                fields:
                  - { name: label, label: Label, type: string }
                  - { name: href,  label: URL,   type: string }

          # -- Insider Hero block ------------------------------------------
          - name: insider-hero
            label: Insider Hero (Editorial)
            fields:
              - name: heading
                label: "Heading (use *asterisks* for italic)"
                type: string
              - { name: subheading, label: Subheading (optional), type: text }

  # -- Blog Collection -----------------------------------------------------
  - name: blog
    label: Blog Posts
    path: src/content/blog
    type: collection
    format: yaml-frontmatter
    filename: "{slug}.md"
    view:
      primary: title
      sort: date
      order: desc
    fields:
      - { name: slug,     label: "Slug (URL)",             type: string }
      - { name: title,    label: Title,                    type: string }
      - { name: date,     label: Date,                     type: date   }
      - name: category
        label: Category
        type: select
        options:
          values:
            - { value: "News and Updates",     label: "News and Updates"     }
            - { value: "Resources and Guides", label: "Resources and Guides" }
            - { value: "Pet Care Tips",        label: "Pet Care Tips"        }
      - { name: image,    label: "Cover image (optional)", type: image  }
      - { name: imageAlt, label: "Image alt",              type: string }
      - { name: excerpt,  label: Excerpt,                  type: text   }

  # -- Insider Page --------------------------------------------------------
  - name: insider
    label: Insider (Blog Page)
    path: src/data/insider.json
    type: file
    format: json
    fields:
      - { name: title,          label: Page Title,       type: string }
      - { name: description,    label: Meta Description, type: text   }
      - name: heroHeading
        label: "Hero Heading (use *asterisks* for italic)"
        type: string
      - { name: heroSubheading, label: Hero Subheading,  type: text   }

          # -- Insider Hero block ------------------------------------------
          - name: insider-hero
            label: Insider Hero (Editorial)
            fields:
              - name: heading
                label: "Heading (use *asterisks* for italic)"
                type: string
              - { name: subheading, label: Subheading (optional), type: text }

  # -- Blog Collection -----------------------------------------------------
  - name: blog
    label: Blog Posts
    path: src/content/blog
    type: collection
    format: yaml-frontmatter
    filename: "{slug}.md"
    view:
      primary: title
      sort: date
      order: desc
    fields:
      - { name: slug,     label: "Slug (URL)",             type: string }
      - { name: title,    label: Title,                    type: string }
      - { name: date,     label: Date,                     type: date   }
      - name: category
        label: Category
        type: select
        options:
          values:
            - { value: "News and Updates",     label: "News and Updates"     }
            - { value: "Resources and Guides", label: "Resources and Guides" }
            - { value: "Pet Care Tips",        label: "Pet Care Tips"        }
      - { name: image,    label: "Cover image (optional)", type: image  }
      - { name: imageAlt, label: "Image alt",              type: string }
      - { name: excerpt,  label: Excerpt,                  type: text   }

  # -- Insider Page --------------------------------------------------------
  - name: insider
    label: Insider (Blog Page)
    path: src/data/insider.json
    type: file
    format: json
    fields:
      - { name: title,          label: Page Title,       type: string }
      - { name: description,    label: Meta Description, type: text   }
      - name: heroHeading
        label: "Hero Heading (use *asterisks* for italic)"
        type: string
      - { name: heroSubheading, label: Hero Subheading,  type: text   }

